<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Download — Guardian App</title>
  <link rel="stylesheet" href="assets/css/style.css">
</head>
<body>
  <header class="site-header">
    <div class="container">
      <div class="brand">
        <img src="assets/img/app-icon.png" alt="Guardian logo" class="brand-icon">
        <span class="brand-text">Guardian</span>
      </div>
      <nav class="nav" aria-label="Primary">
        <a class="nav-link" href="index.html">Home</a>
        <a class="nav-link" href="about.html">About Us</a>
        <a class="nav-link" href="features.html">About the App</a>
        <a class="nav-link" href="download.html">Download</a>
      </nav>
      
    </div>
  </header>

  <main class="center">
    <section class="card download-card">
      <div class="download-grid">
        <div class="download-text">
          <h1>Download</h1>
          <p class="lead">Get Guardian on mobile.</p>
          <p class="muted">Links are placeholders — replace with your App Store and Play Store URLs. Tap a badge to download from the respective store.</p>
        </div>

        <div class="download-badges">
          <div class="store-badges">
            <a class="badge appstore" href="#" aria-label="Download on the App Store">
              <img src="assets/img/appstore.svg" alt="Download on the App Store">
            </a>

            <a class="badge play" href="#" aria-label="Get it on Google Play">
              <img src="assets/img/googleplay.png" alt="Get it on Google Play">
            </a>
          </div>
        </div>
      </div>
    </section>
  </main>

  <script src="assets/js/script.js"></script>
</body>
</html>
